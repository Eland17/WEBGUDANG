<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Barang Masuk</title>

<style>
* { box-sizing: border-box; }

body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: #e9f0fb;
  padding: 1rem;
  margin: 0;
  color: #333;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  flex-wrap: wrap;
  min-height: 100vh;
}

h2 {
  text-align: center;
  margin-bottom: 1.5rem;
  color: #004085;
  font-size: 1.2rem;
}

form {
  width: 100%;
  max-width: 600px;
  background: #fff;
  padding: 1.5rem;
  border-radius: 10px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.1);
}

label {
  font-weight: 600;
  display: block;
  margin-bottom: 0.4rem;
  font-size: 0.9rem;
}

.input-container {
  position: relative;
  margin-bottom: 1rem;
}

input, select {
  width: 100%;
  padding: 0.6rem 0.8rem;
  border: 1.8px solid #a3bffa;
  border-radius: 6px;
  font-size: 0.9rem;
}

input:focus, select:focus {
  border-color: #3b6dfc;
  outline: none;
}

.suggestion-box {
  position: absolute;
  background: white;
  width: 100%;
  max-height: 150px;
  overflow-y: auto;
  z-index: 9999;
  margin: 0;
  padding: 0;
  border-radius: 0 0 6px 6px;
}

.suggestion-box div {
  padding: 6px 10px;
  cursor: pointer;
  font-size: 0.85rem;
}

.suggestion-box div:hover {
  background: #e0e0e0;
}

.btn-container {
  display: flex;
  gap: 0.5rem;
  justify-content: center;
  margin-top: 1.5rem;
}

button {
  border: none;
  padding: 0.6rem 1.2rem;
  background: #3b6dfc;
  color: white;
  border-radius: 7px;
  font-weight: 600;
  cursor: pointer;
}

button.btn-back {
  background: #6c757d;
}
</style>
</head>

<body>

<form id="formMasuk">

<h2>Barang Masuk</h2>

<!-- KODE BARANG -->
<div class="input-container">
<label>Kode Barang</label>
<input type="text" id="kode_barang" autocomplete="off">
<div class="suggestion-box" id="sKode"></div>
</div>

<!-- HS CODE -->
<div class="input-container">
<label>HS Code</label>
<input type="text" id="hs_code">
</div>

<!-- NAMA BARANG -->
<div class="input-container">
<label>Nama Barang</label>
<input type="text" id="nama_barang" autocomplete="off">
<div class="suggestion-box" id="sNama"></div>
</div>

<!-- BUYER -->
<div class="input-container">
<label>Kode Buyer</label>
<input type="text" id="kode_buyer" autocomplete="off">
<div class="suggestion-box" id="sBuyer"></div>
</div>

<!-- SATUAN -->
<div class="input-container">
<label>Satuan</label>
<select id="satuan">
<option value="">Pilih</option>
<option>PCS</option>
<option>ROLL</option>
<option>CONES</option>
<option>KG</option>
<option>METER</option>
<option>YARD</option>
<option>SETS</option>
</select>
</div>

<!-- JUMLAH -->
<div class="input-container">
<label>Jumlah</label>
<input type="text" id="jumlah">
</div>

<!-- KETERANGAN -->
<div class="input-container">
<label>Keterangan</label>
<input type="text" id="keterangan" autocomplete="off">
<div class="suggestion-box" id="sKet"></div>
</div>

<!-- TANGGAL -->
<div class="input-container">
<label>Tanggal</label>
<input type="date" id="tanggal">
</div>

<div class="btn-container">
<button type="submit">Simpan</button>
<button type="button" class="btn-back" onclick="window.location.href='index.html'">Kembali</button>
</div>

</form>

<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyACOluEhfPw4JBlBaHyXtf1k3TIJAHikKo",
  authDomain: "inventory-gudang-16dfe.firebaseapp.com",
  projectId: "inventory-gudang-16dfe"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* ===== DATA ===== */
let barangMap = new Map();
let buyerSet = new Set();
let ketSet = new Set();

async function loadData() {
  const snap = await db.collection("barangMasuk").get();

  snap.docs.forEach(doc => {
    const d = doc.data();

    if (d.kode_barang) {
      barangMap.set(d.kode_barang, {
        nama: d.nama_barang || "",
        hs: d.hs_code || "-"
      });
    }

    if (d.kode_buyer) buyerSet.add(d.kode_buyer);
    if (d.keterangan) ketSet.add(d.keterangan);
  });
}
loadData();

/* ===== AUTOCOMPLETE ===== */
function suggest(input, box, data) {
  const val = input.value.toLowerCase();
  box.innerHTML = "";
  if (!val) return;

  [...data]
    .filter(x => x.toLowerCase().includes(val))
    .slice(0, 10)
    .forEach(item => {
      const div = document.createElement("div");
      div.textContent = item;
      div.onclick = () => {
        input.value = item;
        box.innerHTML = "";
      };
      box.appendChild(div);
    });
}

/* ELEMENT */
const kode = document.getElementById("kode_barang");
const nama = document.getElementById("nama_barang");
const hs = document.getElementById("hs_code");
const buyer = document.getElementById("kode_buyer");
const ket = document.getElementById("keterangan");

const sKode = document.getElementById("sKode");
const sNama = document.getElementById("sNama");
const sBuyer = document.getElementById("sBuyer");
const sKet = document.getElementById("sKet");

/* KODE BARANG */
kode.addEventListener("input", () => {
  sKode.innerHTML = "";
  const val = kode.value.toLowerCase();

  [...barangMap.entries()]
    .filter(([k]) => k.toLowerCase().includes(val))
    .slice(0,10)
    .forEach(([k,v]) => {
      const div = document.createElement("div");
      div.textContent = k;
      div.onclick = () => {
        kode.value = k;
        nama.value = v.nama;
        hs.value = v.hs;
        sKode.innerHTML = "";
      };
      sKode.appendChild(div);
    });
});

/* NAMA BARANG */
nama.addEventListener("input", () => {
  sNama.innerHTML = "";
  const val = nama.value.toLowerCase();

  [...barangMap.entries()]
    .filter(([,v]) => v.nama.toLowerCase().includes(val))
    .slice(0,10)
    .forEach(([k,v]) => {
      const div = document.createElement("div");
      div.textContent = v.nama;
      div.onclick = () => {
        nama.value = v.nama;
        kode.value = k;
        hs.value = v.hs;
        sNama.innerHTML = "";
      };
      sNama.appendChild(div);
    });
});

/* BUYER */
buyer.addEventListener("input", () => suggest(buyer, sBuyer, buyerSet));

/* KETERANGAN */
ket.addEventListener("input", () => suggest(ket, sKet, ketSet));

/* CLOSE OUTSIDE */
document.addEventListener("click", e => {
  if (!e.target.closest(".input-container")) {
    sKode.innerHTML = "";
    sNama.innerHTML = "";
    sBuyer.innerHTML = "";
    sKet.innerHTML = "";
  }
});

/* SAVE */
let isSaving = false;

document.getElementById("formMasuk").addEventListener("submit", async e => {
  e.preventDefault();

  // 🚫 CEGAH DOUBLE SUBMIT
  if (isSaving) return;
  isSaving = true;

  const btn = e.target.querySelector("button[type='submit']");
  btn.disabled = true;
  btn.textContent = "Menyimpan...";

  try {
    const tanggal = document.getElementById("tanggal").value;
    const jumlahVal = document.getElementById("jumlah").value;

    // VALIDASI
    if (!tanggal) {
      alert("Tanggal wajib diisi!");
      document.getElementById("tanggal").focus();
      isSaving = false;
      btn.disabled = false;
      btn.textContent = "Simpan";
      return;
    }

    if (!jumlahVal || parseFloat(jumlahVal) <= 0) {
      alert("Jumlah harus lebih dari 0!");
      document.getElementById("jumlah").focus();
      isSaving = false;
      btn.disabled = false;
      btn.textContent = "Simpan";
      return;
    }

    await db.collection("barangMasuk").add({
      kode_barang: kode.value,
      nama_barang: nama.value,
      hs_code: hs.value || "-",
      kode_buyer: buyer.value,
      satuan: document.getElementById("satuan").value,
      jumlah: parseFloat(jumlahVal),
      keterangan: ket.value,
      tanggal: tanggal,
      timestamp: firebase.firestore.FieldValue.serverTimestamp()
    });

    alert("Data barang masuk berhasil disimpan!");
    e.target.reset();

  } catch (err) {
    console.error(err);
    alert("Gagal menyimpan data!");
  } finally {
    isSaving = false;
    btn.disabled = false;
    btn.textContent = "Simpan";
  }
});
</script>

</body>
</html>
